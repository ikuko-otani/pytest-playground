[pytest]
# asyncio_mode = auto  ->  every async def test_* is treated as async automatically
# asyncio_mode = auto にすると、async def test_* に @pytest.mark.asyncio を
#           書かなくてよくなる（推奨設定）
asyncio_mode = auto

# Default options: show extra test summary info for failures and errors
# 失敗・エラーの要約を常に表示する
addopts = -v
